name: Version Bump

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - closed
    branches:
      - main

permissions:
  contents: write

jobs:
  version-bump:
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true)

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Read current version from README
        id: current
        run: |
          VERSION=$(grep -oP '(?<=<!-- version: v)[\d.]+(?= -->)' README.md || echo "2.0.0")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)
          PATCH=${PATCH:-0}  # default to 0 if not present (old x.y format)
          echo "major=$MAJOR" >> $GITHUB_OUTPUT
          echo "minor=$MINOR" >> $GITHUB_OUTPUT
          echo "patch=$PATCH" >> $GITHUB_OUTPUT

      - name: Detect changed files
        id: changes
        if: github.event_name == 'push'
        run: |
          # Get list of changed files vs previous commit
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || git diff --name-only HEAD)
          echo "Changed files:"
          echo "$CHANGED"

          # Check if ALL changed files are under src/data/
          NON_DATA=$(echo "$CHANGED" | grep -v '^src/data/' | grep -v '^$' || true)

          if [ -z "$NON_DATA" ]; then
            echo "type=patch" >> $GITHUB_OUTPUT
            echo "All changes are data-only → patch bump"
          else
            echo "type=minor" >> $GITHUB_OUTPUT
            echo "Code changes detected → minor bump"
          fi

      - name: Compute new version
        id: new
        run: |
          MAJOR=${{ steps.current.outputs.major }}
          MINOR=${{ steps.current.outputs.minor }}
          PATCH=${{ steps.current.outputs.patch }}

          if [ "${{ github.event_name }}" == "pull_request" ]; then
            # PR merge → major bump, reset minor and patch
            NEW_MAJOR=$((MAJOR + 1))
            NEW_VERSION="${NEW_MAJOR}.0.0"
            echo "bump_type=major" >> $GITHUB_OUTPUT
          elif [ "${{ steps.changes.outputs.type }}" == "patch" ]; then
            # Data-only push → patch bump
            NEW_PATCH=$((PATCH + 1))
            NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
            echo "bump_type=patch" >> $GITHUB_OUTPUT
          else
            # Code push → minor bump, reset patch
            NEW_MINOR=$((MINOR + 1))
            NEW_VERSION="${MAJOR}.${NEW_MINOR}.0"
            echo "bump_type=minor" >> $GITHUB_OUTPUT
          fi

          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Update README version
        run: |
          NEW_VERSION=${{ steps.new.outputs.version }}
          BUMP_TYPE=${{ steps.new.outputs.bump_type }}
          DATE=$(date +'%Y-%m-%d')

          # Update hidden version tag
          sed -i "s/<!-- version: v[0-9.]* -->/<!-- version: v${NEW_VERSION} -->/" README.md

          # Update shield badge if present
          sed -i "s/!\[Version\](https:\/\/img\.shields\.io\/badge\/version-v[0-9.]*-/![Version](https:\/\/img.shields.io\/badge\/version-v${NEW_VERSION}-/" README.md

          # Append to changelog section if present
          if grep -q "## Changelog" README.md; then
            sed -i "/## Changelog/a - **v${NEW_VERSION}** (${DATE}) — ${BUMP_TYPE} bump" README.md
          fi

      - name: Commit and push
        run: |
          NEW_VERSION=${{ steps.new.outputs.version }}
          git add README.md
          git diff --staged --quiet || git commit -m "chore: bump version to v${NEW_VERSION} [skip ci]"
          git push