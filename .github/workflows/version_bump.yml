name: Version Bump

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - closed
    branches:
      - main

permissions:
  contents: write

jobs:
  version-bump:
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true)

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Read current version from README
        id: current
        run: |
          VERSION=$(grep -oP '(?<=<!-- version: v)[\d.]+(?= -->)' README.md || echo "1.0")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          echo "major=$MAJOR" >> $GITHUB_OUTPUT
          echo "minor=$MINOR" >> $GITHUB_OUTPUT

      - name: Compute new version
        id: new
        run: |
          MAJOR=${{ steps.current.outputs.major }}
          MINOR=${{ steps.current.outputs.minor }}

          if [ "${{ github.event_name }}" == "pull_request" ]; then
            NEW_MAJOR=$((MAJOR + 1))
            NEW_VERSION="${NEW_MAJOR}.0"
            echo "bump_type=major" >> $GITHUB_OUTPUT
          else
            NEW_MINOR=$((MINOR + 1))
            NEW_VERSION="${MAJOR}.${NEW_MINOR}"
            echo "bump_type=minor" >> $GITHUB_OUTPUT
          fi

          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Update README version
        run: |
          NEW_VERSION=${{ steps.new.outputs.version }}
          BUMP_TYPE=${{ steps.new.outputs.bump_type }}
          DATE=$(date +'%Y-%m-%d')

          sed -i "s/<!-- version: v[0-9.]* -->/<!-- version: v${NEW_VERSION} -->/" README.md

          sed -i "s/!\[Version\](https:\/\/img\.shields\.io\/badge\/version-v[0-9.]*-/![Version](https:\/\/img.shields.io\/badge\/version-v${NEW_VERSION}-/" README.md

          if grep -q "## Changelog" README.md; then
            sed -i "/## Changelog/a - **v${NEW_VERSION}** (${DATE}) — ${BUMP_TYPE} bump via ${{ github.event_name == 'pull_request' && 'PR merge' || 'direct push' }}" README.md
          fi

      - name: Commit and push
        run: |
          NEW_VERSION=${{ steps.new.outputs.version }}
          git add README.md
          git diff --staged --quiet || git commit -m "chore: bump version to v${NEW_VERSION} [skip ci]"
          git push